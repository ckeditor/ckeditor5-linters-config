packages:
  - packages/*

allowBuilds:
  'esbuild': true
  'unrs-resolver': true
  'snyk': true

overrides:
  'diff@^7': '^8.0.3'
  'serialize-javascript@^6': '^7.0.5'
  'esbuild@^0.27': '^0.28.1'
  'js-yaml@^3': '^4.1.2'

minimumReleaseAge: 4320 # 3 days
minimumReleaseAgeExclude:
  - '@ckeditor/*'
  - '@cksource/*'
  - '*ckeditor5*'

shellEmulator: true
shamefullyHoist: true
preferFrozenLockfile: true
linkWorkspacePackages: true
verifyDepsBeforeRun: false
