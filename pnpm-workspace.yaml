packages:
  - packages/*

onlyBuiltDependencies:
  - esbuild
  - unrs-resolver
  - snyk

overrides:
  'esbuild@^0.27': '^0.28.1'
  'js-yaml@^3': '^4.2.0'
  'postcss-selector-parser@^7': '^7.1.2'

minimumReleaseAge: 4320 # 3 days
minimumReleaseAgeExclude:
  - '@ckeditor/*'
  - '@cksource/*'
  - '*ckeditor5*'

shellEmulator: true
shamefullyHoist: true
preferFrozenLockfile: true
linkWorkspacePackages: true
