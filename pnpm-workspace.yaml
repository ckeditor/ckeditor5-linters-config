packages:
  - packages/*

allowBuilds:
  'esbuild': true
  'unrs-resolver': true
  'snyk': true

overrides:
  'esbuild@^0.27': '^0.28.1'
  'js-yaml@^3': '^4.2.0'
  'postcss-selector-parser@^7': '^7.1.2'

minimumReleaseAge: 4320 # 3 days
minimumReleaseAgeExclude:
  - '@ckeditor/*'
  - '@cksource/*'
  - '*ckeditor5*'

shellEmulator: true
shamefullyHoist: true
preferFrozenLockfile: true
linkWorkspacePackages: true
verifyDepsBeforeRun: false
